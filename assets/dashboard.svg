<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Vibe coding dashboard: 2.5B tokens, $1.97K spent, global rank #425" width="100%">
  <defs>
    <linearGradient id="dashBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <radialGradient id="dashGlow" cx="0.15" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="dashSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <style>
      .serif { font-family: ui-serif, "Source Serif Pro", "Iowan Old Style", Georgia, "Times New Roman", serif; }
      .sans  { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif; }
      .mono  { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
      .ink { fill: #141413; }
      .muted { fill: #5E5D59; }
      .coral { fill: #D97757; }
      .deep-coral { fill: #C6613F; }
    </style>
  </defs>

  <rect width="900" height="260" rx="20" fill="url(#dashBg)"/>
  <circle cx="120" cy="240" r="240" fill="url(#dashGlow)" filter="url(#dashSoft)"/>

  <!-- header -->
  <g transform="translate(32,40)">
    <path d="M6 0 L7.5 5.5 L13 7 L7.5 8.5 L6 14 L4.5 8.5 L-1 7 L4.5 5.5 Z" class="coral"/>
    <text x="24" y="11" class="mono muted" font-size="11" letter-spacing="2">VIBE · CODING · DASHBOARD</text>
    <text x="836" y="11" class="mono muted" font-size="11" letter-spacing="1.5" text-anchor="end">
      <tspan class="coral" font-weight="600">●</tspan> LIVE · tokscale.ai/u/yousiki
    </text>
  </g>

  <!-- thin coral rule -->
  <line x1="32" y1="72" x2="868" y2="72" stroke="#D97757" stroke-opacity="0.22"/>

  <!-- three number columns -->
  <!-- tokens -->
  <g transform="translate(32,104)">
    <text y="0" class="mono muted" font-size="11" letter-spacing="1.5">TOKENS</text>
    <text y="64" class="serif coral" font-size="64" font-weight="500" letter-spacing="-2">2.5B</text>
    <text y="96" class="sans muted" font-size="13" font-style="italic">conjured with agents</text>
  </g>

  <!-- divider -->
  <line x1="296" y1="112" x2="296" y2="208" stroke="#D97757" stroke-opacity="0.16" stroke-dasharray="2 4"/>

  <!-- spent -->
  <g transform="translate(328,104)">
    <text y="0" class="mono muted" font-size="11" letter-spacing="1.5">SPENT</text>
    <text y="64" class="serif ink" font-size="64" font-weight="500" letter-spacing="-2">$1.97<tspan font-size="40" class="muted">K</tspan></text>
    <text y="96" class="sans muted" font-size="13" font-style="italic">cost of thinking out loud</text>
  </g>

  <!-- divider -->
  <line x1="604" y1="112" x2="604" y2="208" stroke="#D97757" stroke-opacity="0.16" stroke-dasharray="2 4"/>

  <!-- rank -->
  <g transform="translate(636,104)">
    <text y="0" class="mono muted" font-size="11" letter-spacing="1.5">GLOBAL RANK</text>
    <text y="64" class="serif deep-coral" font-size="64" font-weight="500" letter-spacing="-2">#425</text>
    <text y="96" class="sans muted" font-size="13" font-style="italic">on the tokscale leaderboard</text>
  </g>

  <!-- sparkline / decoration at bottom -->
  <g transform="translate(32,226)" opacity="0.5">
    <path d="M0 8 Q40 0 80 6 T160 4 T240 10 T320 2 T400 8 T480 5 T560 9 T640 3 T720 7 T800 2 T836 6"
          fill="none" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
