<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Hi — I'm YouSiki. PhD student by day, vibe coder by night." width="100%">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.85" cy="0.15" r="0.55">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="heroSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <style>
      .serif { font-family: ui-serif, "Source Serif Pro", "Iowan Old Style", Georgia, "Times New Roman", serif; }
      .sans  { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif; }
      .mono  { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
      .ink { fill: #141413; }
      .muted { fill: #5E5D59; }
      .coral { fill: #D97757; }
    </style>
  </defs>

  <rect width="900" height="360" rx="20" fill="url(#heroBg)"/>
  <circle cx="780" cy="60" r="220" fill="url(#heroGlow)" filter="url(#heroSoft)"/>

  <!-- window chrome -->
  <g transform="translate(32,28)">
    <circle cx="7"  cy="7" r="6" fill="#E8A598"/>
    <circle cx="28" cy="7" r="6" fill="#E8D598"/>
    <circle cx="49" cy="7" r="6" fill="#B8D5A3"/>
    <text x="84" y="11" class="mono muted" font-size="12">~ / yousiki / profile.md</text>
    <g transform="translate(740,-2)">
      <rect x="0" y="0" width="96" height="20" rx="10" fill="#D97757" fill-opacity="0.12"/>
      <circle cx="12" cy="10" r="3" class="coral"/>
      <text x="22" y="14" class="mono coral" font-size="11" font-weight="600">● live · opus</text>
    </g>
  </g>

  <!-- user prompt -->
  <g transform="translate(40,88)">
    <text class="mono muted" font-size="11" letter-spacing="1.5">YOU</text>
    <text y="24" class="sans ink" font-size="17" font-weight="500">who is yousiki?</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="140" x2="860" y2="140" stroke="#D97757" stroke-opacity="0.18"/>

  <!-- claude mark + label -->
  <g transform="translate(40,170)">
    <path d="M8 -6 L9.6 0.4 L16 2 L9.6 3.6 L8 10 L6.4 3.6 L0 2 L6.4 0.4 Z" class="coral"/>
    <text x="26" y="4" class="mono muted" font-size="11" letter-spacing="1.5">CLAUDE</text>
  </g>

  <!-- headline -->
  <g transform="translate(40,228)">
    <text class="serif ink" font-size="52" font-weight="500" letter-spacing="-1.4">Hi — I'm <tspan class="coral" font-style="italic">YouSiki</tspan>.</text>
    <text y="44" class="serif ink" font-size="24" font-weight="400" letter-spacing="-0.3" fill-opacity="0.82">
      PhD student by day. <tspan class="coral" font-style="italic">Vibe coder</tspan> by night.
    </text>
  </g>

  <!-- chip row -->
  <g transform="translate(40,312)" class="sans">
    <g>
      <rect width="124" height="26" rx="13" fill="#141413" fill-opacity="0.06"/>
      <text x="15" y="17" font-size="12" class="ink" font-weight="500">✳︎ Peking Univ.</text>
    </g>
    <g transform="translate(134,0)">
      <rect width="96" height="26" rx="13" fill="#D97757" fill-opacity="0.14"/>
      <text x="15" y="17" font-size="12" class="coral" font-weight="600">claude code</text>
    </g>
    <g transform="translate(240,0)">
      <rect width="128" height="26" rx="13" fill="#D97757" fill-opacity="0.14"/>
      <text x="15" y="17" font-size="12" class="coral" font-weight="600">oh-my-opencode</text>
    </g>
    <g transform="translate(378,0)">
      <rect width="64" height="26" rx="13" fill="#D97757" fill-opacity="0.14"/>
      <text x="15" y="17" font-size="12" class="coral" font-weight="600">codex</text>
    </g>

    <!-- inline social links on the right -->
    <g transform="translate(540,0)">
      <text x="0" y="17" font-size="12" class="muted" font-weight="500">linkedin</text>
      <text x="56" y="17" font-size="12" class="muted">·</text>
      <text x="68" y="17" font-size="12" class="muted" font-weight="500">x</text>
      <text x="82" y="17" font-size="12" class="muted">·</text>
      <text x="94" y="17" font-size="12" class="coral" font-weight="600">tokscale</text>
      <text x="146" y="17" font-size="12" class="muted">·</text>
      <text x="158" y="17" font-size="12" class="muted" font-weight="500">siki.moe</text>
    </g>
  </g>
</svg>
