<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-label="YouSiki — vibe coder, PhD, open source enjoyer" width="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .serif { font-family: ui-serif, "Source Serif Pro", "Iowan Old Style", Georgia, "Times New Roman", serif; }
      .sans  { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif; }
      .mono  { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
      .fill-ink { fill: #141413; }
      .fill-muted { fill: #5E5D59; }
      .fill-coral { fill: #D97757; }
      .fill-coral-deep { fill: #C6613F; }
    </style>
  </defs>

  <rect width="1200" height="460" rx="24" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="220" fill="url(#glow)" filter="url(#soft)"/>

  <!-- window chrome -->
  <g transform="translate(40,32)">
    <circle cx="8"  cy="8" r="7" fill="#E8A598"/>
    <circle cx="32" cy="8" r="7" fill="#E8D598"/>
    <circle cx="56" cy="8" r="7" fill="#B8D5A3"/>
    <text x="92" y="12" class="mono fill-muted" font-size="12">~ / yousiki / profile.md</text>
    <g transform="translate(1028,0)">
      <rect x="0" y="-4" width="90" height="24" rx="12" fill="#D97757" fill-opacity="0.12"/>
      <circle cx="14" cy="8" r="3" class="fill-coral"/>
      <text x="24" y="12" class="mono fill-coral" font-size="11" font-weight="600">● live</text>
    </g>
  </g>

  <!-- user prompt -->
  <g transform="translate(60,96)">
    <text class="mono fill-muted" font-size="12" letter-spacing="1.5">YOU</text>
    <text y="28" class="sans fill-ink" font-size="20" font-weight="500">who is yousiki?</text>
  </g>

  <!-- divider -->
  <line x1="60" y1="156" x2="1140" y2="156" stroke="#D97757" stroke-opacity="0.18" stroke-width="1"/>

  <!-- claude reply header -->
  <g transform="translate(60,188)">
    <!-- asterisk / claude mark -->
    <g transform="translate(0,-12)">
      <path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" class="fill-coral"/>
    </g>
    <text x="36" y="6" class="mono fill-muted" font-size="12" letter-spacing="1.5">CLAUDE</text>
  </g>

  <!-- hero headline -->
  <g transform="translate(60,246)">
    <text class="serif fill-ink" font-size="56" font-weight="500" letter-spacing="-1.5">Hi — I'm <tspan class="fill-coral" font-style="italic">YouSiki</tspan>.</text>
    <text y="56" class="serif fill-ink" font-size="30" font-weight="400" letter-spacing="-0.5" fill-opacity="0.82">
      PhD student by day. <tspan class="fill-coral" font-style="italic">Vibe coder</tspan> by night.
    </text>
  </g>

  <!-- tag chips -->
  <g transform="translate(60,370)" class="sans">
    <g>
      <rect x="0" y="0" width="130" height="32" rx="16" fill="#2C2824" fill-opacity="0.06"/>
      <text x="18" y="21" font-size="13" class="fill-ink" font-weight="500">✳︎ Peking Univ.</text>
    </g>
    <g transform="translate(142,0)">
      <rect x="0" y="0" width="140" height="32" rx="16" fill="#D97757" fill-opacity="0.14"/>
      <text x="18" y="21" font-size="13" class="fill-coral" font-weight="600">claude-code</text>
    </g>
    <g transform="translate(294,0)">
      <rect x="0" y="0" width="158" height="32" rx="16" fill="#D97757" fill-opacity="0.14"/>
      <text x="18" y="21" font-size="13" class="fill-coral" font-weight="600">oh-my-opencode</text>
    </g>
    <g transform="translate(464,0)">
      <rect x="0" y="0" width="78" height="32" rx="16" fill="#D97757" fill-opacity="0.14"/>
      <text x="18" y="21" font-size="13" class="fill-coral" font-weight="600">codex</text>
    </g>
    <g transform="translate(554,0)">
      <rect x="0" y="0" width="160" height="32" rx="16" fill="#141413" fill-opacity="0.06"/>
      <text x="18" y="21" font-size="13" class="fill-ink" font-weight="500">open source enjoyer</text>
    </g>
  </g>

  <!-- right column stats -->
  <g transform="translate(820,196)" class="sans">
    <text y="0" class="mono fill-muted" font-size="11" letter-spacing="1.5">CURRENTLY</text>
    <text y="34" class="serif fill-ink" font-size="22" font-weight="500">shipping ideas</text>
    <text y="58" class="serif fill-muted" font-size="16" font-style="italic">through conversation.</text>

    <g transform="translate(0,96)">
      <line x1="0" y1="0" x2="280" y2="0" stroke="#D97757" stroke-opacity="0.25"/>
      <text y="30" class="mono fill-muted" font-size="11" letter-spacing="1.5">VIBE STACK</text>
      <text y="62" class="mono fill-ink" font-size="15" font-weight="600">
        <tspan class="fill-coral">$</tspan> claude · opencode · codex
      </text>
      <text y="88" class="mono fill-ink" font-size="15" font-weight="500" fill-opacity="0.7">
        <tspan class="fill-coral">$</tspan> tokscale · rtk · ccs · nix
      </text>
    </g>
  </g>
</svg>
