<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Daily agent stack: claude code, oh-my-opencode, codex" width="100%">
  <defs>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <radialGradient id="stackGlow" cx="0.12" cy="0.88" r="0.5">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="stackSoft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .serif { font-family: ui-serif, "Source Serif Pro", "Iowan Old Style", Georgia, "Times New Roman", serif; }
      .sans  { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif; }
      .mono  { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
      .ink { fill: #141413; }
      .muted { fill: #5E5D59; }
      .coral { fill: #D97757; }
      .deep-coral { fill: #C6613F; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#stackBg)"/>
  <circle cx="180" cy="260" r="240" fill="url(#stackGlow)" filter="url(#stackSoft)"/>

  <!-- section label -->
  <g transform="translate(56,52)">
    <path d="M6 0 L7.5 5.5 L13 7 L7.5 8.5 L6 14 L4.5 8.5 L-1 7 L4.5 5.5 Z" class="coral"/>
    <text x="24" y="11" class="mono muted" font-size="12" letter-spacing="2">DAILY · AGENT · STACK</text>
  </g>

  <!-- headline right -->
  <g transform="translate(56,52)">
    <text x="1088" y="11" class="mono muted" font-size="12" letter-spacing="2" text-anchor="end">3 · COMPANIONS</text>
  </g>

  <!-- thin coral rule -->
  <line x1="56" y1="84" x2="1144" y2="84" stroke="#D97757" stroke-opacity="0.22" stroke-width="1"/>

  <!-- card 1 -->
  <g transform="translate(56,120)">
    <circle cx="14" cy="14" r="5" class="coral">
      <animate attributeName="r" values="4.8;5.6;4.8" dur="2.8s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="14" r="11" fill="none" stroke="#D97757" stroke-opacity="0.28" stroke-width="1"/>
    <text x="40" y="19" class="mono muted" font-size="11" letter-spacing="1.5">PRIMARY AGENT</text>
    <text y="78" class="serif ink" font-size="40" font-weight="500" letter-spacing="-0.8">claude <tspan class="coral" font-style="italic">code</tspan></text>
    <line x1="0" y1="104" x2="60" y2="104" stroke="#141413" stroke-width="2"/>
    <text y="134" class="sans muted" font-size="14" font-style="italic">the one that closes the loop</text>
    <text y="160" class="mono ink" font-size="12" fill-opacity="0.75">opus 4.7 · sonnet 4.6 · haiku 4.5</text>
  </g>

  <!-- divider -->
  <line x1="444" y1="128" x2="444" y2="252" stroke="#D97757" stroke-opacity="0.14" stroke-dasharray="2 4"/>

  <!-- card 2 -->
  <g transform="translate(476,120)">
    <circle cx="14" cy="14" r="5" class="coral">
      <animate attributeName="r" values="4.8;5.6;4.8" dur="2.8s" begin="-0.93s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="-0.93s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="14" r="11" fill="none" stroke="#D97757" stroke-opacity="0.28" stroke-width="1"/>
    <text x="40" y="19" class="mono muted" font-size="11" letter-spacing="1.5">CODING WORKSPACE</text>
    <text y="78" class="serif ink" font-size="40" font-weight="500" letter-spacing="-0.8">oh-my-<tspan class="coral" font-style="italic">opencode</tspan></text>
    <line x1="0" y1="104" x2="60" y2="104" stroke="#141413" stroke-width="2"/>
    <text y="134" class="sans muted" font-size="14" font-style="italic">where the editor and the agent meet</text>
    <text y="160" class="mono ink" font-size="12" fill-opacity="0.75">my fork · tmux-native · opinionated</text>
  </g>

  <!-- divider -->
  <line x1="868" y1="128" x2="868" y2="252" stroke="#D97757" stroke-opacity="0.14" stroke-dasharray="2 4"/>

  <!-- card 3 -->
  <g transform="translate(900,120)">
    <circle cx="14" cy="14" r="5" class="coral">
      <animate attributeName="r" values="4.8;5.6;4.8" dur="2.8s" begin="-1.87s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="-1.87s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="14" r="11" fill="none" stroke="#D97757" stroke-opacity="0.28" stroke-width="1"/>
    <text x="40" y="19" class="mono muted" font-size="11" letter-spacing="1.5">CLI COMPANION</text>
    <text y="78" class="serif ink" font-size="40" font-weight="500" letter-spacing="-0.8"><tspan class="coral" font-style="italic">codex</tspan></text>
    <line x1="0" y1="104" x2="60" y2="104" stroke="#141413" stroke-width="2"/>
    <text y="134" class="sans muted" font-size="14" font-style="italic">the second opinion I trust most</text>
    <text y="160" class="mono ink" font-size="12" fill-opacity="0.75">gpt-5.4 · rescue duty · background</text>
  </g>
</svg>
