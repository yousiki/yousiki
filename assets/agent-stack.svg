<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Daily agent stack: claude code, oh-my-opencode, codex" width="100%">
  <defs>
    <linearGradient id="stackBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF9F5"/>
      <stop offset="1" stop-color="#F0EEE6"/>
    </linearGradient>
    <radialGradient id="stackGlow" cx="0.5" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="stackSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <style>
      .serif { font-family: ui-serif, "Source Serif Pro", "Iowan Old Style", Georgia, "Times New Roman", serif; }
      .sans  { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif; }
      .mono  { font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
      .ink { fill: #141413; }
      .muted { fill: #5E5D59; }
      .coral { fill: #D97757; }
    </style>
  </defs>

  <rect width="900" height="260" rx="20" fill="url(#stackBg)"/>
  <circle cx="450" cy="240" r="240" fill="url(#stackGlow)" filter="url(#stackSoft)"/>

  <!-- header -->
  <g transform="translate(32,40)">
    <path d="M6 0 L7.5 5.5 L13 7 L7.5 8.5 L6 14 L4.5 8.5 L-1 7 L4.5 5.5 Z" class="coral"/>
    <text x="24" y="11" class="mono muted" font-size="11" letter-spacing="2">DAILY · AGENT · STACK</text>
    <text x="836" y="11" class="mono muted" font-size="11" letter-spacing="1.5" text-anchor="end">3 · COMPANIONS</text>
  </g>

  <!-- thin coral rule -->
  <line x1="32" y1="72" x2="868" y2="72" stroke="#D97757" stroke-opacity="0.22"/>

  <!-- card 1 — claude code -->
  <g transform="translate(32,104)">
    <circle cx="10" cy="10" r="5" class="coral">
      <animate attributeName="r" values="4.8;5.6;4.8" dur="2.8s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="10" r="11" fill="none" stroke="#D97757" stroke-opacity="0.28"/>
    <text x="32" y="14" class="mono muted" font-size="10" letter-spacing="1.2">PRIMARY AGENT</text>
    <text y="60" class="serif ink" font-size="30" font-weight="500" letter-spacing="-0.5">claude <tspan class="coral" font-style="italic">code</tspan></text>
    <line x1="0" y1="80" x2="44" y2="80" stroke="#141413" stroke-width="2"/>
    <text y="106" class="sans muted" font-size="12" font-style="italic">the one that closes the loop</text>
    <text y="130" class="mono ink" font-size="11" fill-opacity="0.72">opus 4.7 · sonnet 4.6 · haiku</text>
  </g>

  <!-- divider -->
  <line x1="304" y1="112" x2="304" y2="228" stroke="#D97757" stroke-opacity="0.16" stroke-dasharray="2 4"/>

  <!-- card 2 — oh-my-opencode -->
  <g transform="translate(328,104)">
    <circle cx="10" cy="10" r="5" class="coral">
      <animate attributeName="r" values="4.8;5.6;4.8" dur="2.8s" begin="-0.93s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="-0.93s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="10" r="11" fill="none" stroke="#D97757" stroke-opacity="0.28"/>
    <text x="32" y="14" class="mono muted" font-size="10" letter-spacing="1.2">CODING WORKSPACE</text>
    <text y="60" class="serif ink" font-size="30" font-weight="500" letter-spacing="-0.5">oh-my-<tspan class="coral" font-style="italic">opencode</tspan></text>
    <line x1="0" y1="80" x2="44" y2="80" stroke="#141413" stroke-width="2"/>
    <text y="106" class="sans muted" font-size="12" font-style="italic">where the editor meets the agent</text>
    <text y="130" class="mono ink" font-size="11" fill-opacity="0.72">my fork · tmux-native · opinionated</text>
  </g>

  <!-- divider -->
  <line x1="600" y1="112" x2="600" y2="228" stroke="#D97757" stroke-opacity="0.16" stroke-dasharray="2 4"/>

  <!-- card 3 — codex -->
  <g transform="translate(624,104)">
    <circle cx="10" cy="10" r="5" class="coral">
      <animate attributeName="r" values="4.8;5.6;4.8" dur="2.8s" begin="-1.87s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" begin="-1.87s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="10" r="11" fill="none" stroke="#D97757" stroke-opacity="0.28"/>
    <text x="32" y="14" class="mono muted" font-size="10" letter-spacing="1.2">CLI COMPANION</text>
    <text y="60" class="serif ink" font-size="30" font-weight="500" letter-spacing="-0.5"><tspan class="coral" font-style="italic">codex</tspan></text>
    <line x1="0" y1="80" x2="44" y2="80" stroke="#141413" stroke-width="2"/>
    <text y="106" class="sans muted" font-size="12" font-style="italic">the second opinion I trust most</text>
    <text y="130" class="mono ink" font-size="11" fill-opacity="0.72">gpt-5.4 · rescue · background</text>
  </g>
</svg>
